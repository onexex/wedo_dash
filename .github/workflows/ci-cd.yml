name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # CI — syntax-lint every PHP file and make sure no credential file slipped in.
  # ---------------------------------------------------------------------------
  lint:
    name: PHP lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Lint all PHP files (php -l)
        run: |
          status=0; count=0
          while IFS= read -r f; do
            count=$((count+1))
            if ! php -l "$f" > /dev/null 2>&1; then
              echo "::error file=$f::PHP syntax error"
              php -l "$f" || true
              status=1
            fi
          done < <(git ls-files '*.php')
          echo "Linted $count PHP files."
          exit $status

      - name: Guard against committed credentials
        run: |
          if git ls-files | grep -E '(^|/)config\.local\.php$' ; then
            echo "::error::config.local.php must never be committed (it holds DB credentials)."
            exit 1
          fi
          echo "OK — no credential override file is tracked."

  # ---------------------------------------------------------------------------
  # CD — rsync over SSH to the devdashboard cPanel directory. Runs only after
  # lint passes, only on main / manual, and only once SSH secrets are set.
  #   * -c  : compare by CHECKSUM (CI resets mtimes, so size/time would resend all)
  #   * -z  : compress in transit
  #   * NO --delete : never removes server files missing from the repo (protects
  #                   user uploads); config.local.php is excluded so it's untouched.
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to devdashboard (rsync/SSH)
    needs: lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-devdashboard
      cancel-in-progress: true
    steps:
      - name: Check SSH secrets are configured
        id: check
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          if [ -z "$SSH_HOST" ]; then
            echo "::warning::SSH secrets not set — skipping deploy. Add SSH_HOST / SSH_USER / SSH_PORT / SSH_KEY in Settings → Secrets and variables → Actions."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.check.outputs.configured == 'true'

      - name: Load deploy SSH key into agent
        if: steps.check.outputs.configured == 'true'
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Deploy with rsync (changed files only, compressed)
        if: steps.check.outputs.configured == 'true'
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          rsync -rlzc \
            -e "ssh -p ${SSH_PORT:-22} -o StrictHostKeyChecking=accept-new" \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='config.local.php' \
            --exclude='*.bak' \
            --exclude='error_log' \
            --exclude='*.log' \
            --exclude='.ftp-deploy-sync-state.json' \
            ./ \
            "${SSH_USER}@${SSH_HOST}:public_html/devdashboard.wedoinc.ph/"
          echo "Deploy complete."
