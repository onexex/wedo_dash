name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # CI — syntax-lint every PHP file and make sure no credential file slipped in testing this.
  # ---------------------------------------------------------------------------
  lint:
    name: PHP lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Lint all PHP files (php -l)
        run: |
          status=0; count=0
          while IFS= read -r f; do
            count=$((count+1))
            if ! php -l "$f" > /dev/null 2>&1; then
              echo "::error file=$f::PHP syntax error"
              php -l "$f" || true
              status=1
            fi
          done < <(git ls-files '*.php')
          echo "Linted $count PHP files."
          exit $status

      - name: Guard against committed credentials
        run: |
          if git ls-files | grep -E '(^|/)config\.local\.php$' ; then
            echo "::error::config.local.php must never be committed (it holds DB credentials)."
            exit 1
          fi
          echo "OK — no credential override file is tracked."

  # ---------------------------------------------------------------------------
  # CD — fast FTP deploy: bundle the app into ONE zip, upload it (one transfer,
  # no per-file overhead), then a token-protected PHP helper unzips it ON the
  # server (into its own dir) and removes itself + the zip. Extraction only
  # overwrites files present in the zip, so config.local.php and any user
  # uploads on the server are left untouched.
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to devdashboard (zip over FTP)
    needs: lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-devdashboard
      cancel-in-progress: true
    env:
      # Edit these two if your host differs (they are NOT secrets):
      FTP_REMOTE_DIR: public_html/dashboard.wedoinc.xyz      # relative to the FTP login's home
      DEPLOY_URL: http://dashboard.wedoinc.xyz/_deploy.php  # change to http:// if the dev subdomain has no SSL
    steps:
      - name: Check secrets are configured
        id: check
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          missing=""
          [ -z "$FTP_SERVER" ]   && missing="$missing FTP_SERVER"
          [ -z "$FTP_USERNAME" ] && missing="$missing FTP_USERNAME"
          [ -z "$FTP_PASSWORD" ] && missing="$missing FTP_PASSWORD"
          [ -z "$DEPLOY_TOKEN" ] && missing="$missing DEPLOY_TOKEN"
          if [ -n "$missing" ]; then
            echo "::warning::Deploy skipped — missing secret(s):$missing"
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "All deploy secrets present."
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.check.outputs.configured == 'true'

      - name: Build deploy.zip
        if: steps.check.outputs.configured == 'true'
        run: |
          zip -r -q deploy.zip . \
            -x '.git/*' '.github/*' 'config.local.php' '*.bak' '*.log' 'error_log' 'deploy.zip' '_deploy.php'
          echo "zip size:"; ls -lh deploy.zip | awk '{print $5}'

      - name: Generate token-protected unzip helper
        if: steps.check.outputs.configured == 'true'
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          cat > _deploy.php <<PHP
          <?php
          \$expected = '${DEPLOY_TOKEN}';
          \$given = isset(\$_GET['token']) ? \$_GET['token'] : '';
          if (\$expected === '' || !hash_equals(\$expected, \$given)) { http_response_code(403); exit('forbidden'); }
          \$zip = __DIR__ . '/deploy.zip';
          if (!is_file(\$zip)) { http_response_code(404); exit('no deploy.zip'); }
          \$z = new ZipArchive();
          if (\$z->open(\$zip) !== true) { http_response_code(500); exit('cannot open zip'); }
          \$ok = \$z->extractTo(__DIR__);
          \$z->close();
          @unlink(\$zip);
          @unlink(__FILE__);
          http_response_code(\$ok ? 200 : 500);
          echo \$ok ? ('deployed ' . date('c')) : 'extract failed';
          PHP

      - name: Upload zip + helper over FTPS
        if: steps.check.outputs.configured == 'true'
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          up() {
            curl --fail --ssl-reqd -k --ftp-create-dirs -T "$1" \
              "ftp://${FTP_SERVER}/${FTP_REMOTE_DIR}/$2" \
              --user "${FTP_USERNAME}:${FTP_PASSWORD}"
          }
          up deploy.zip deploy.zip
          up _deploy.php _deploy.php
          echo "Uploaded zip + helper."

      - name: Trigger extraction on server
        if: steps.check.outputs.configured == 'true'
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          echo "Triggering ${DEPLOY_URL}"
          resp=$(curl -fsS -k "${DEPLOY_URL}?token=${DEPLOY_TOKEN}") || { echo "trigger failed: ${resp}"; exit 1; }
          echo "server response: ${resp}"
          case "$resp" in
            *deployed*) echo "Deploy OK." ;;
            *) echo "::error::unexpected server response (files may be in the wrong dir, or DEPLOY_URL/token wrong)"; exit 1 ;;
          esac
