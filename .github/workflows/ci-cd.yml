name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # CI — syntax-lint every PHP file and make sure no credential file slipped in.
  # ---------------------------------------------------------------------------
  lint:
    name: PHP lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Lint all PHP files (php -l)
        run: |
          status=0; count=0
          while IFS= read -r f; do
            count=$((count+1))
            if ! php -l "$f" > /dev/null 2>&1; then
              echo "::error file=$f::PHP syntax error"
              php -l "$f" || true
              status=1
            fi
          done < <(git ls-files '*.php')
          echo "Linted $count PHP files."
          exit $status

      - name: Guard against committed credentials
        run: |
          if git ls-files | grep -E '(^|/)config\.local\.php$' ; then
            echo "::error::config.local.php must never be committed (it holds DB credentials)."
            exit 1
          fi
          echo "OK — no credential override file is tracked."

  # ---------------------------------------------------------------------------
  # CD — rsync over SSH (single compressed connection; -c compares by checksum
  # because CI resets mtimes). No --delete, so server-only files (config.local.php,
  # user uploads) are never removed. Runs after lint, on main / manual, once the
  # SSH secrets exist.
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy via rsync/SSH
    needs: lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-server
      cancel-in-progress: true
    env:
      # Document root for the site, RELATIVE to the SSH user's home (/home/<user>).
      # VERIFY this against cPanel → Domains → Document Root for the target domain.
      DEPLOY_PATH: public_html/dashboard.wedoinc.xyz
      # A URL that should return the app after deploy (used only for a sanity check):
      VERIFY_URL: http://dashboard.wedoinc.xyz/login.php
    steps:
      - name: Check SSH secrets are configured
        id: check
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_KEY: ${{ secrets.SSH_KEY }}
        run: |
          missing=""
          [ -z "$SSH_HOST" ] && missing="$missing SSH_HOST"
          [ -z "$SSH_USER" ] && missing="$missing SSH_USER"
          [ -z "$SSH_KEY" ]  && missing="$missing SSH_KEY"
          if [ -n "$missing" ]; then
            echo "::warning::Deploy skipped — missing secret(s):$missing  (SSH_PORT is optional; defaults to 22)"
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "All SSH secrets present."
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.check.outputs.configured == 'true'

      - name: Load deploy SSH key into agent
        if: steps.check.outputs.configured == 'true'
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Deploy with rsync (changed files only, compressed)
        if: steps.check.outputs.configured == 'true'
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          PORT="${SSH_PORT:-22}"
          echo "Deploying to ${SSH_USER}@${SSH_HOST}:${DEPLOY_PATH}/ (port ${PORT})"
          rsync -rlzc --no-perms --no-owner --no-group \
            -e "ssh -p ${PORT} -o StrictHostKeyChecking=accept-new" \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='config.local.php' \
            --exclude='*.bak' \
            --exclude='*.log' \
            --exclude='error_log' \
            ./ \
            "${SSH_USER}@${SSH_HOST}:${DEPLOY_PATH}/"
          echo "rsync complete."

      - name: Verify the site responds
        if: steps.check.outputs.configured == 'true'
        run: |
          echo "Checking ${VERIFY_URL}"
          code=$(curl -s -k -o /tmp/body -w '%{http_code}' "${VERIFY_URL}" || echo "000")
          echo "HTTP ${code}"
          echo "----- first 300 bytes of response -----"
          head -c 300 /tmp/body || true; echo
          echo "---------------------------------------"
          if [ "$code" = "000" ]; then
            echo "::warning::Could not reach ${VERIFY_URL} (DNS not pointed / SSL / domain not set up)."
          elif [ "$code" != "200" ]; then
            echo "::warning::Got HTTP ${code} — if this isn't the app, DEPLOY_PATH likely doesn't match the domain's Document Root."
          fi
