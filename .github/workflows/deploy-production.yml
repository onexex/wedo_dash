name: Deploy Production

# Production deployment. Runs ONLY when you push to the `production` branch.
# Staging (.xyz) is handled separately by ci-cd.yml on the `main` branch.
on:
  push:
    branches: [production]
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # CI — syntax-lint every PHP file and make sure no credential file slipped in.
  # ---------------------------------------------------------------------------
  lint:
    name: PHP lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
      - name: Lint all PHP files (php -l)
        run: |
          status=0; count=0
          while IFS= read -r f; do
            count=$((count+1))
            if ! php -l "$f" > /dev/null 2>&1; then
              echo "::error file=$f::PHP syntax error"; php -l "$f" || true; status=1
            fi
          done < <(git ls-files '*.php')
          echo "Linted $count PHP files."
          exit $status
      - name: Guard against committed credentials
        run: |
          if git ls-files | grep -E '(^|/)config\.local\.php$' ; then
            echo "::error::config.local.php must never be committed."; exit 1
          fi
          echo "OK — no credential file tracked."

  # ---------------------------------------------------------------------------
  # CD (PRODUCTION) — package into one zip, SFTP it over SSH (port 22, password
  # auth), then unzip + fix permissions on the server. Reuses the same FTP_*
  # secrets as staging (same cPanel/SSH login, different Document Root). If
  # production ever moves to a separate server, swap these to PROD_FTP_* secrets.
  # unzip -o overwrites app files but leaves config.local.php / uploads.
  # ---------------------------------------------------------------------------
  deploy:
    name: Package & deploy to PRODUCTION (.ph)
    needs: lint
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/production')
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-production
      cancel-in-progress: true
    env:
      # EDIT THIS to the PRODUCTION domain's absolute Document Root (cPanel → Domains → Document Root):
      REMOTE_DIR: /home/bi474wqgzz3g/public_html/dashboard.wedoinc.ph
      SSH_PORT: 22
      VERIFY_URL: http://dashboard.wedoinc.ph/login.php
    steps:
      - name: Check secrets are configured
        id: check
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          missing=""
          [ -z "$FTP_SERVER" ]   && missing="$missing FTP_SERVER"
          [ -z "$FTP_USERNAME" ] && missing="$missing FTP_USERNAME"
          [ -z "$FTP_PASSWORD" ] && missing="$missing FTP_PASSWORD"
          if [ -n "$missing" ]; then
            echo "::warning::Deploy skipped — missing secret(s):$missing"
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "All secrets present."
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.check.outputs.configured == 'true'

      - name: Package app into one zip
        if: steps.check.outputs.configured == 'true'
        run: |
          zip -r -q deploy.zip . \
            -x '.git/*' '.github/*' 'config.local.php' '*.bak' '*.log' 'error_log' 'deploy.zip' \
               'w_conn.php' '*/w_conn.php'
          ls -lh deploy.zip | awk '{print "zip size: " $5}'

      - name: Ensure remote directory exists
        if: steps.check.outputs.configured == 'true'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ env.SSH_PORT }}
          script: mkdir -p ${{ env.REMOTE_DIR }}

      - name: Upload deploy.zip via SFTP
        if: steps.check.outputs.configured == 'true'
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ env.SSH_PORT }}
          local_path: './deploy.zip'
          remote_path: '${{ env.REMOTE_DIR }}/'

      - name: Unzip + fix permissions on server
        if: steps.check.outputs.configured == 'true'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ env.SSH_PORT }}
          script: |
            cd ${{ env.REMOTE_DIR }} || { echo "REMOTE_DIR not found"; exit 1; }
            if [ -f deploy.zip ]; then
              unzip -o -q deploy.zip && rm -f deploy.zip
            else
              echo "deploy.zip not found on server!"; exit 1
            fi
            find . -type d -exec chmod 755 {} \;
            find . -type f -exec chmod 644 {} \;
            echo "Unzipped + permissions set in $(pwd)"

      - name: Verify the site responds
        if: steps.check.outputs.configured == 'true'
        run: |
          code=$(curl -s -k -o /tmp/body -w '%{http_code}' "${VERIFY_URL}" || echo "000")
          echo "GET ${VERIFY_URL} -> HTTP ${code}"
          echo "----- first 300 bytes -----"; head -c 300 /tmp/body || true; echo
          [ "$code" = "200" ] || echo "::warning::Non-200 — if not the app, check REMOTE_DIR vs the domain's Document Root."
